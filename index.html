<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>엑셀 쉼표 변환기 (공백제거)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 40px 20px; background: #f0f2f5; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; font-size: 22px; }
        textarea { width: 100%; height: 180px; padding: 12px; border: 2px solid #e1e4e8; border-radius: 10px; box-sizing: border-box; resize: none; outline: none; transition: border 0.3s; }
        textarea:focus { border-color: #1a73e8; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .convert-btn { background: #1a73e8; color: white; }
        .convert-btn:hover { background: #1557b0; }
        .copy-btn { background: #34a853; color: white; }
        .copy-btn:hover { background: #2d8a46; }
        #result { margin-top: 20px; padding: 15px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; word-break: break-all; font-size: 14px; color: #333; max-height: 150px; overflow-y: auto; }
        .label { font-size: 12px; color: #666; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>쉼표(,) 변환기</h2>
    <span class="label">입력 (엑셀에서 복사)</span>
    <textarea id="inputData" placeholder="이곳에 데이터를 붙여넣으세요..."></textarea>
    
    <div class="btn-group">
        <button class="convert-btn" onclick="convert()">쉼표로 연결</button>
        <button class="copy-btn" onclick="copyToClipboard()">결과 복사</button>
    </div>
    
    <span class="label" style="margin-top:20px;">결과 (공백 없음)</span>
    <div id="result">여기에 결과가 표시됩니다.</div>
</div>

<script>
    function convert() {
        const input = document.getElementById('inputData').value;
        // 1. 줄바꿈 기준 분할 2. 앞뒤 공백 제거 3. 빈 줄 제거
        const lines = input.split(/\r?\n/).map(line => line.trim()).filter(line => line !== "");
        
        // 쉼표 뒤에 공백 없이 바로 연결
        const joined = lines.join(','); 
        
        document.getElementById('result').innerText = joined;
    }

    function copyToClipboard() {
        const text = document.getElementById('result').innerText;
        if(text === "여기에 결과가 표시됩니다." || text === "") return;
        
        navigator.clipboard.writeText(text).then(() => {
            alert('클립보드에 복사되었습니다!');
        });
    }
</script>

</body>
</html>
